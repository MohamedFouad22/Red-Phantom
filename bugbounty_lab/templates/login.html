{% extends "base.html" %} {% block content %}
<style>
  .auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
  }

  .form-card {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 0, 60, 0.2);
    border-radius: 4px;
    padding: 50px 40px;
    width: 100%;
    max-width: 450px;
    position: relative;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
  }

  /* زوايا ديكورية للفخامة */
  .form-card::before,
  .form-card::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    border: 2px solid #ff003c;
  }

  .form-card::before {
    top: -2px;
    left: -2px;
    border-right: none;
    border-bottom: none;
  }

  .form-card::after {
    bottom: -2px;
    right: -2px;
    border-left: none;
    border-top: none;
  }

  .form-card h2 {
    color: #fff;
    font-size: 2.5rem;
    text-align: center;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 6px;
    font-weight: 900;
    filter: drop-shadow(0 0 10px rgba(255, 0, 60, 0.5));
  }

  .form-group {
    margin-bottom: 25px;
  }

  label {
    display: block;
    margin-bottom: 10px;
    color: #ff003c;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 15px;
    background: rgba(7, 11, 23, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    color: #fff;
    font-size: 1rem;
    box-sizing: border-box;
    transition: 0.4s;
    font-family: "Fira Code", monospace;
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    outline: none;
    border-color: #ff003c;
    background: rgba(255, 0, 60, 0.05);
    box-shadow: inset 0 0 10px rgba(255, 0, 60, 0.1);
  }

  button[type="submit"] {
    width: 100%;
    padding: 16px;
    margin-top: 20px;
    background: #ff003c;
    color: white;
    border: none;
    border-radius: 2px;
    font-size: 1rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 0 20px rgba(255, 0, 60, 0.3);
  }

  button[type="submit"]:hover {
    background: #fff;
    color: #ff003c;
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
  }

  .form-footer {
    text-align: center;
    margin-top: 35px;
    font-size: 0.8rem;
    color: #8892b0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .form-footer a {
    color: #ff003c;
    text-decoration: none;
    font-weight: 900;
    margin-left: 5px;
    transition: 0.3s;
  }

  .form-footer a:hover {
    color: #fff;
    text-shadow: 0 0 10px #ff003c;
  }
</style>

<div class="auth-container">
  <section class="form-card">
    <h2>Login</h2>
    <form method="post">
      <div class="form-group">
        <label for="username">Identity Identifier</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="OPERATIVE_ID"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Encryption Key</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit">Initialize Session</button>
    </form>

    <div class="form-footer">
      Unauthorized?
      <a href="{{ url_for('register') }}">Create Identity</a>
    </div>
  </section>
</div>
{% endblock %}
