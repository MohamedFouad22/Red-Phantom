{% extends "base.html" %} {% block content %}
<style>
  .scoreboard-container {
    max-width: 1000px;
    margin: 40px auto;
    position: relative;
  }

  .scoreboard-section {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 0, 60, 0.2);
    border-radius: 4px;
    padding: 40px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    position: relative;
    overflow: hidden;
  }

  .scoreboard-section::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255, 0, 60, 0.03) 3px
    );
    pointer-events: none;
  }

  .scoreboard-section h2 {
    color: #fff;
    font-size: 2.5rem;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 5px;
    margin-bottom: 40px;
    font-weight: 900;
    filter: drop-shadow(0 0 15px rgba(255, 0, 60, 0.5));
  }

  .scoreboard {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 10px;
    color: #e2e2e2;
    position: relative;
    z-index: 1;
  }

  .scoreboard thead tr {
    background: transparent;
  }

  .scoreboard th {
    text-align: left;
    padding: 15px 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #ff003c;
    font-size: 0.8rem;
    font-weight: 800;
    border-bottom: 2px solid rgba(255, 0, 60, 0.3);
  }

  .scoreboard tbody tr {
    background: rgba(255, 255, 255, 0.02);
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: default;
  }

  .scoreboard tbody tr:hover {
    background: rgba(255, 0, 60, 0.1);
    transform: scale(1.01) translateX(5px);
    box-shadow: -5px 0 0 #ff003c;
  }

  .scoreboard td {
    padding: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.03);
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  }

  .rank-cell {
    font-weight: 900;
    color: #ff003c;
    width: 100px;
    font-family: "Fira Code", monospace;
    font-size: 1.2rem;
  }

  .user-cell {
    font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
  }

  .score-cell {
    color: #00ff64;
    font-family: "Fira Code", monospace;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(0, 255, 100, 0.3);
  }

  .solves-badge {
    background: rgba(0, 0, 0, 0.3);
    color: #aaa;
    padding: 6px 15px;
    border-radius: 2px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .scoreboard tbody tr:nth-child(1) .rank-cell {
    color: #ffd700;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
  }
  .scoreboard tbody tr:nth-child(2) .rank-cell {
    color: #c0c0c0;
    text-shadow: 0 0 15px rgba(192, 192, 192, 0.5);
  }
  .scoreboard tbody tr:nth-child(3) .rank-cell {
    color: #cd7f32;
    text-shadow: 0 0 15px rgba(205, 127, 50, 0.5);
  }

  @media (max-width: 768px) {
    .scoreboard-section {
      padding: 20px;
      overflow-x: auto;
    }
    .scoreboard th,
    .scoreboard td {
      padding: 12px;
      font-size: 0.85rem;
    }
  }
</style>

<div class="scoreboard-container">
  <section class="scoreboard-section">
    <h2>Global Leaderboard</h2>
    <table class="scoreboard">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Operative</th>
          <th>XP Score</th>
          <th>Missions</th>
        </tr>
      </thead>
      <tbody>
        {% for user in ranking %}
        <tr>
          <td class="rank-cell">#{{ "%02d" % loop.index }}</td>
          <td class="user-cell">{{ user.username }}</td>
          <td class="score-cell">{{ user.score }} XP</td>
          <td>
            <span class="solves-badge"
              >{{ user.solves|length }} Compromised</span
            >
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </section>
</div>
{% endblock %}
